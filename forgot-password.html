<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lupa Password</title>

<style>

body{

font-family:Poppins,sans-serif;

background:
linear-gradient(
135deg,
#3D441E,
#6D712E,
#737B4C
);

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;
}

.box{

width:400px;
max-width:90%;

background:white;

padding:40px;

border-radius:20px;
}

h1{

text-align:center;

color:#3D441E;
}

input{

width:100%;

padding:12px;

margin:15px 0;

border:2px solid #ddd;

border-radius:10px;
}

button{

width:100%;

padding:12px;

border:none;

border-radius:10px;

background:#3D441E;

color:white;

cursor:pointer;
}

#result{

margin-top:20px;

text-align:center;
}

a{

display:block;

margin-top:15px;

text-align:center;

text-decoration:none;

color:#3D441E;
}

</style>
</head>

<body>

<div class="box">

<h1>Lupa Password</h1>

<input
type="email"
id="email"
placeholder="Masukkan Email">

<button onclick="cekPassword()">
Cari Password
</button>

<div id="result"></div>

<a href="login.html">
Kembali ke Login
</a>

</div>

<script>

function cekPassword(){

const email =
document.getElementById("email").value;

const users =
JSON.parse(
localStorage.getItem("users")
) || [];

const user =
users.find(
u => u.email === email
);

const result =
document.getElementById("result");

if(user){

result.innerHTML =
`
<p>
Password Anda:
<b>${user.password}</b>
</p>
`;

}

else{

result.innerHTML =
`
<p style="color:red;">
Email tidak ditemukan
</p>
`;

}

}

</script>

</body>
</html>
