<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Nindya Portfolio</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
    135deg,
    #3D441E,
    #6D712E,
    #737B4C
    );
}

.login-box{

    width:400px;
    max-width:90%;

    background:white;

    padding:40px;

    border-radius:20px;

    box-shadow:
    0 10px 30px rgba(0,0,0,.2);
}

.login-box h1{

    text-align:center;

    margin-bottom:10px;

    color:#3D441E;
}

.login-box p{

    text-align:center;

    color:#666;

    margin-bottom:25px;
}

.input-group{

    margin-bottom:20px;
}

.input-group label{

    display:block;

    margin-bottom:8px;
}

.input-group input{

    width:100%;

    padding:12px;

    border:2px solid #ddd;

    border-radius:10px;

    outline:none;
}

.input-group input:focus{

    border-color:#6D712E;
}

button{

    width:100%;

    padding:12px;

    border:none;

    border-radius:10px;

    cursor:pointer;

    background:#3D441E;

    color:white;

    font-size:16px;
}

button:hover{

    background:#6D712E;
}

.links{

    text-align:center;

    margin-top:20px;
}

.links a{

    display:block;

    margin:8px 0;

    text-decoration:none;

    color:#3D441E;
}

#message{

    text-align:center;

    margin-top:15px;
}

</style>

</head>

<body>

<div class="login-box">

    <h1>Login</h1>

    <p>Nindya Portfolio</p>

    <form id="loginForm">

        <div class="input-group">

            <label>Username</label>

            <input
            type="text"
            id="username"
            required>

        </div>

        <div class="input-group">

            <label>Password</label>

            <input
            type="password"
            id="password"
            required>

        </div>

        <button type="submit">
            Login
        </button>

    </form>

    <div id="message"></div>

    <div class="links">

        <a href="register.html">
            Daftar Akun
        </a>

        <a href="forgot-password.html">
            Lupa Password
        </a>

        <a href="../index.html">
            Kembali ke Beranda
        </a>

    </div>

</div>

<script>

// USER DEFAULT

const defaultUsers = [

{
    username:"heri",
    password:"123"
},

{
    username:"user1",
    email:"user@gmail.com",
    password:"123"
}

];

// BUAT DATA USER

if(!localStorage.getItem("users")){

    localStorage.setItem(
        "users",
        JSON.stringify(defaultUsers)
    );

}

// LOGIN

document
.getElementById("loginForm")
.addEventListener("submit",function(e){

    e.preventDefault();

    const username =
    document.getElementById("username").value;

    const password =
    document.getElementById("password").value;

    const users =
    JSON.parse(
        localStorage.getItem("users")
    );

    const user =
    users.find(
        u =>
        u.username === username &&
        u.password === password
    );

    const message =
    document.getElementById("message");

    if(user){

        message.innerHTML =
        "<p style='color:green;'>Login Berhasil!</p>";

        localStorage.setItem(
            "currentUser",
            username
        );

        setTimeout(()=>{

            window.location.href =
            "../index.html";

        },1000);

    }

    else{

        message.innerHTML =
        "<p style='color:red;'>Username atau Password Salah!</p>";

    }

});

</script>

</body>
</html>>
